<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Join ABVP Gorakhpur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0D1B3E 0%,#1a2f6b 50%,#0D1B3E 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#fff;border-radius:20px;padding:28px 24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.hdr{text-align:center;margin-bottom:24px;}
.hdr img{width:64px;height:64px;object-fit:contain;margin-bottom:10px;}
.hdr h1{font-size:20px;font-weight:900;color:#0D1B3E;}
.hdr p{font-size:12px;color:#9CA3AF;margin-top:3px;}
.divider{height:2px;background:linear-gradient(90deg,#FF6B00,#FFB800);border-radius:2px;margin-bottom:22px;}
.fg{margin-bottom:14px;}
label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
input,select{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:11px 14px;font-size:14px;outline:none;color:#1C1C2E;background:#FAFAFA;transition:border .2s;}
input:focus,select:focus{border-color:#FF6B00;background:#fff;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#FF6B00,#FFB800);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;letter-spacing:.3px;}
.btn:active{opacity:.9;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.success{display:none;text-align:center;padding:20px 0;}
.success .icon{font-size:56px;margin-bottom:12px;}
.success h2{font-size:20px;font-weight:900;color:#0D1B3E;margin-bottom:6px;}
.success p{font-size:13px;color:#6B7280;line-height:1.6;}
.err{color:#DC2626;font-size:12px;margin-top:8px;text-align:center;display:none;}
.flag{font-size:11px;color:#9CA3AF;text-align:center;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <img id="logo" src="" alt="ABVP">
    <h1>Join ABVP Gorakhpur</h1>
    <p>Akhil Bharatiya Vidyarthi Parishad</p>
  </div>
  <div class="divider"></div>

  <div id="form-area">
    <div class="fg">
      <label>Full Name *</label>
      <input id="jf-name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="row">
      <div class="fg">
        <label>Phone</label>
        <input id="jf-phone" type="tel" placeholder="10-digit number" autocomplete="tel">
      </div>
      <div class="fg">
        <label>Birthday</label>
        <input id="jf-bday" type="date">
      </div>
    </div>
    <div class="fg">
      <label>Address</label>
      <input id="jf-addr" placeholder="City / Area / College">
    </div>
    <div class="row">
      <div class="fg">
        <label>Designation</label>
        <input id="jf-duty" placeholder="e.g. Student">
      </div>
      <div class="fg">
        <label>Year</label>
        <input id="jf-year" placeholder="e.g. 2024">
      </div>
    </div>
    <div id="err-msg" class="err">Please enter your full name.</div>
    <button class="btn" id="sbtn" onclick="submitJoin()">📨 Submit Join Request</button>
    <div class="flag">🇮🇳 वन्दे मातरम् • जय हिन्द</div>
  </div>

  <div class="success" id="success-area">
    <div class="icon">🎉</div>
    <h2>Request Submitted!</h2>
    <p>Thank you for joining ABVP Gorakhpur.<br>Your request has been sent for approval.<br>You will be contacted shortly.</p>
    <div style="margin-top:20px;font-size:22px">🇮🇳</div>
    <div style="font-size:12px;color:#FF6B00;font-weight:700;margin-top:6px">वन्दे मातरम्</div>
  </div>
</div>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function v(id){var e=document.getElementById(id);return e?e.value.trim():'';}

function fval(val){
  if(val===null||val===undefined)return {nullValue:null};
  if(typeof val==='boolean')return {booleanValue:val};
  if(typeof val==='number')return Number.isInteger(val)?{integerValue:String(val)}:{doubleValue:val};
  return {stringValue:String(val)};
}
function toFields(obj){
  var f={};
  Object.keys(obj).forEach(function(k){f[k]=fval(obj[k]);});
  return f;
}

function submitJoin(){
  var name=v('jf-name');
  var err=document.getElementById('err-msg');
  if(!name){err.style.display='block';return;}
  err.style.display='none';
  var btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='Submitting...';
  var id=uid();
  var data={name:name,phone:v('jf-phone'),address:v('jf-addr'),duty:v('jf-duty'),year:v('jf-year'),birthday:v('jf-bday'),status:'pending',createdAt:Date.now()};
  fetch(FSB+'pending/'+id+'?key='+AKEY,{
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields:toFields(data)})
  }).then(function(){
    document.getElementById('form-area').style.display='none';
    document.getElementById('success-area').style.display='block';
  }).catch(function(){
    btn.disabled=false;btn.textContent='📨 Submit Join Request';
    err.textContent='Something went wrong. Please try again.';
    err.style.display='block';
  });
}
</script>
